server:
  port: 8085

spring:
  application:
    name: api-gateway-service

  cloud:
    gateway:
      default-filters:
        - AddResponseHeader=X-Gateway, AV-Converter-Gateway

      routes:
        - id: upload-service
          uri: http://upload-service:8081
          predicates:
            - Path=/api/upload/**
          filters:
            - StripPrefix=2

        - id: conversion-service
          uri: http//conversion-service:8080
          predicates:
            - Path=/api/conversion/**
          filters:
            - StripPrefix=2

        - id: download-service
          uri: http//download-service:8082
          predicates:
            - Path=/api/download/**
          filters:
            - StripPrefix=2

        - id: storage-service
          uri: http//storage-service:8083
          predicates:
            - Path=/internal/storage/**
          filters:
            - StripPrefix=2

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "http://localhost:3000"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true